<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phonics W13–14 — Long o, Long u, Prefixes</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#fff8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}
h1{font-family:'Fredoka One',cursive;color:#0369a1;font-size:1.7rem;text-align:center;margin-bottom:2px}
.subtitle{color:#64748b;font-size:.85rem;margin-bottom:12px;text-align:center}

/* dots */
.dots{display:flex;gap:5px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.dot{width:10px;height:10px;border-radius:50%;background:#e2e8f0;transition:.3s}
.dot.done{background:#0369a1}.dot.active{background:#7dd3fc;box-shadow:0 0 0 3px #e0f2fe}

/* card */
.card{background:#fff;border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:20px;width:100%;max-width:540px;animation:popIn .3s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

.prog-wrap{background:#e2e8f0;border-radius:99px;height:8px;margin-bottom:12px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,#0369a1,#38bdf8);border-radius:99px;transition:.4s}

.phase-title{font-family:'Fredoka One',cursive;color:#0369a1;font-size:1.05rem;text-align:center;margin-bottom:12px}
.counter{text-align:center;color:#94a3b8;font-size:.8rem;margin-top:8px}

/* LEARN boxes */
.learn-section{margin-bottom:12px}
.learn-section h3{font-family:'Fredoka One',cursive;font-size:.95rem;margin-bottom:6px;padding:5px 10px;border-radius:8px;display:inline-block}
.vowel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.vowel-card{border-radius:12px;padding:10px 6px;text-align:center;border:2px solid}
.vowel-card .pat{font-family:'Fredoka One',cursive;font-size:1.4rem}
.vowel-card .words{font-size:.75rem;font-weight:700;margin-top:4px;line-height:1.6}
.oa-c{background:#fef3c7;border-color:#f59e0b}.oa-c .pat{color:#92400e}
.ow-c{background:#dcfce7;border-color:#4ade80}.ow-c .pat{color:#166534}
.oe-c{background:#fce7f3;border-color:#f9a8d4}.oe-c .pat{color:#9d174d}
.ue-c{background:#e0f2fe;border-color:#7dd3fc}.ue-c .pat{color:#0c4a6e}
.ew-c{background:#ede9fe;border-color:#c4b5fd}.ew-c .pat{color:#5b21b6}
.ui-c{background:#d1fae5;border-color:#6ee7b7}.ui-c .pat{color:#065f46}
.prefix-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.prefix-card{border-radius:12px;padding:10px;border:2px solid}
.re-card{background:#fef3c7;border-color:#fbbf24}
.un-card{background:#fee2e2;border-color:#fca5a5}
.prefix-card h4{font-family:'Fredoka One',cursive;font-size:1.1rem;margin-bottom:4px}
.re-card h4{color:#92400e}.un-card h4{color:#991b1b}
.prefix-card .ex{font-size:.78rem;font-weight:700;color:#374151;line-height:1.7}
.rule-tag{display:inline-block;font-size:.78rem;font-weight:800;border-radius:6px;padding:2px 8px;margin-bottom:6px}

/* TYPING exercise */
.clue-box{text-align:center;background:#f0f9ff;border:2px dashed #38bdf8;border-radius:14px;padding:14px;margin-bottom:12px}
.clue-emoji{font-size:2.5rem;margin-bottom:4px}
.clue-zh{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#0369a1}
.clue-en{font-size:.82rem;color:#64748b;margin-top:2px}
.hint-pattern{font-size:.85rem;font-weight:700;color:#0369a1;margin-top:4px}
.type-input{width:100%;border:2.5px solid #7dd3fc;border-radius:12px;padding:12px 14px;font-family:'Fredoka One',cursive;font-size:1.3rem;color:#1e293b;outline:none;text-align:center;transition:.2s;letter-spacing:2px}
.type-input:focus{border-color:#0369a1;box-shadow:0 0 0 3px #e0f2fe}
.type-input.ok{border-color:#4ade80;background:#dcfce7;color:#166534}
.type-input.err{border-color:#f87171;background:#fee2e2;color:#991b1b;animation:shake .3s}
.check-btn{display:block;width:100%;background:#0369a1;color:#fff;border:none;border-radius:12px;padding:11px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;margin-top:10px;transition:.2s}
.check-btn:hover{background:#075985}

/* MC options */
.word-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.word-opt{background:#e0f2fe;border:2px solid #7dd3fc;border-radius:13px;padding:12px;font-family:'Fredoka One',cursive;font-size:1.2rem;color:#0c4a6e;cursor:pointer;transition:.2s;text-align:center;letter-spacing:.5px}
.word-opt:hover{background:#bae6fd;border-color:#38bdf8}
.word-opt.correct{background:#dcfce7;border-color:#4ade80;color:#166534}
.word-opt.wrong{background:#fee2e2;border-color:#f87171;color:#991b1b;animation:shake .3s}
.word-opt:disabled{cursor:default}

/* SORT exercise */
.sort-word-display{font-family:'Fredoka One',cursive;font-size:2.8rem;color:#1e293b;text-align:center;background:#f0f9ff;border:3px dashed #7dd3fc;border-radius:16px;padding:18px;margin-bottom:12px;letter-spacing:2px}
.sort-bucket-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.bucket-btn{font-family:'Fredoka One',cursive;font-size:1.1rem;border:2.5px solid;border-radius:12px;padding:12px 24px;cursor:pointer;transition:.15s}
.bucket-btn:active{transform:scale(.93)}
.bucket-oa{background:#fef3c7;border-color:#f59e0b;color:#92400e}
.bucket-ow{background:#dcfce7;border-color:#4ade80;color:#166534}
.bucket-oe{background:#fce7f3;border-color:#f9a8d4;color:#9d174d}

/* PREFIX */
.prefix-q-box{text-align:center;background:#fff7ed;border:2px dashed #fbbf24;border-radius:14px;padding:14px;margin-bottom:12px}
.prefix-blank{font-family:'Fredoka One',cursive;font-size:2.2rem;color:#374151}
.prefix-btn-row{display:flex;gap:14px;justify-content:center}
.prefix-btn{font-family:'Fredoka One',cursive;font-size:1.2rem;border:2.5px solid;border-radius:12px;padding:12px 28px;cursor:pointer;transition:.15s}
.prefix-btn:active{transform:scale(.93)}
.prefix-btn.re-btn{background:#fef3c7;border-color:#fbbf24;color:#92400e}
.prefix-btn.un-btn{background:#fee2e2;border-color:#fca5a5;color:#991b1b}

/* feedback */
.feedback{min-height:24px;text-align:center;font-weight:700;font-size:.9rem;margin-top:8px}
.feedback.ok{color:#16a34a}.feedback.bad{color:#dc2626}

/* next */
.next-btn{display:block;width:100%;background:#0369a1;color:#fff;border:none;border-radius:14px;padding:13px;font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;margin-top:12px;transition:.2s}
.next-btn:hover{background:#075985}

/* done */
.score-wrap{text-align:center;margin-bottom:14px}
.score-num{font-family:'Fredoka One',cursive;font-size:2.2rem;color:#0369a1}
.wrong-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.wrong-item{background:#fff7ed;border-left:4px solid #f59e0b;border-radius:10px;padding:9px 12px;font-size:.87rem;line-height:1.5}
.wrong-item .wr-q{font-weight:700;color:#1e293b}
.wrong-item .wr-a{color:#16a34a;font-weight:700}
.wrong-item .wr-h{color:#64748b;font-size:.82rem}

.star-pop{position:fixed;pointer-events:none;font-size:2rem;animation:flyUp .8s ease forwards;z-index:999}
@keyframes flyUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(1.5)}}
</style>
</head>
<body>
<h1>🌟 Phonics W13–14</h1>
<p class="subtitle">Long o (oa/ow/oe) · Long u (ue/ew/ui) · Prefixes re- / un-</p>

<div class="dots" id="dots"></div>
<div id="root"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────

// Phase: w13a — Type the long o word (oa in middle, ow at end)
const W13A = [
  { emoji:'🧥', zh:'外套', en:'you wear this to stay warm',
    hint:'Use -oa- (middle)',  answer:'coat',  explain:'coat → oa in the middle: c-OA-t 🧥' },
  { emoji:'🐸', zh:'蟾蜍', en:'a frog-like animal that lives on land',
    hint:'Use -oa- (middle)',  answer:'toad',  explain:'toad → oa in the middle: t-OA-d 🐸' },
  { emoji:'💨', zh:'吹（風吹）', en:'what the wind does',
    hint:'Use -ow (end)',      answer:'blow',  explain:'blow → ow at the end: bl-OW 💨' },
  { emoji:'🎭', zh:'展示', en:'a performance you watch',
    hint:'Use -ow (end)',      answer:'show',  explain:'show → ow at the end: sh-OW 🎭' },
  { emoji:'🚢', zh:'漂浮', en:'to drift gently on water',
    hint:'Use -oa- (middle)',  answer:'float', explain:'float → oa in the middle: fl-OA-t 🚢' },
];

// Phase: w13b — Circle the blend word (3-choice)
const W13B = [
  { clue:'短跑衝刺',    opts:['strip','sprint','splint'],   ans:1, explain:'sprint = 短距離衝刺 → starts with spr- blend 🏃' },
  { clue:'水花四濺',    opts:['thrash','splash','squash'],  ans:1, explain:'splash = 濺起水花 → starts with spl- blend 💦' },
  { clue:'碎片、廢料',  opts:['scrap','splat','school'],    ans:0, explain:'scrap = 碎片 → starts with scr- blend ♻️' },
  { clue:'街道',        opts:['three','spree','street'],    ans:2, explain:'street = 街道 → starts with str- blend 🏙️' },
  { clue:'壓扁',        opts:['squish','spring','string'],  ans:0, explain:'squish = 壓扁 → starts with squ- blend 😝' },
];

// Phase: w13c — Sort oa / ow / oe
const W13C = [
  { word:'road',  bucket:'oa', explain:'r-OA-d → oa in the middle' },
  { word:'show',  bucket:'ow', explain:'sh-OW → ow at the end' },
  { word:'toe',   bucket:'oe', explain:'t-OE → oe at the end' },
  { word:'blow',  bucket:'ow', explain:'bl-OW → ow at the end' },
  { word:'doe',   bucket:'oe', explain:'d-OE → oe at the end (a female deer 🦌)' },
  { word:'glow',  bucket:'ow', explain:'gl-OW → ow at the end ✨' },
];

// Phase: w14a — Type the long u word (ui in middle, ue at end)
const W14A = [
  { emoji:'👔', zh:'套裝',   en:'what you wear for a formal occasion',
    hint:'Use -ui- (middle)', answer:'suit',  explain:'suit → ui in the middle: s-UI-t 👔' },
  { emoji:'📅', zh:'到期',   en:'something owed by a certain date',
    hint:'Use -ue (end)',     answer:'due',   explain:'due → ue at the end: d-UE 📅' },
  { emoji:'🔵', zh:'藍色',   en:'the color of the sky',
    hint:'Use -ue (end)',     answer:'blue',  explain:'blue → ue at the end: bl-UE 🔵' },
  { emoji:'🍎', zh:'水果',   en:'apples, bananas, and oranges are all this',
    hint:'Use -ui- (middle)', answer:'fruit', explain:'fruit → ui in the middle: fr-UI-t 🍎' },
  { emoji:'✅', zh:'真實的',  en:'not false, the real thing',
    hint:'Use -ue (end)',     answer:'true',  explain:'true → ue at the end: tr-UE ✅' },
];

// Phase: w14b — Write prefix re- or un-
const W14B = [
  { word:'do',   prefix:'un', meaning:'撤銷/復原',  explain:'undo = un- (不/反) + do → 取消動作 ↩️' },
  { word:'zip',  prefix:'un', meaning:'拉開拉鍊',   explain:'unzip = un- (反) + zip → 把拉鍊拉開 🤐' },
  { word:'tie',  prefix:'re', meaning:'重新打結',   explain:'retie = re- (again) + tie → 重新綁好 🎀' },
  { word:'set',  prefix:'re', meaning:'重新設定',   explain:'reset = re- (again) + set → 重新設定 🔄' },
  { word:'box',  prefix:'un', meaning:'拆箱',       explain:'unbox = un- (反) + box → 打開箱子 📦' },
];

// ── STATE ─────────────────────────────────────────────────────────────
const PHASES = ['learn','w13a','w13b','w13c','w14a','w14b','done'];
let ph=0, qi=0, score=0, total=0, wrongs=[];
let typed = false;

const PHASE_LABELS = ['📖 Learn','W13A 拼寫','W13B 圈字','W13C 分類','W14A 拼寫','W14B 前綴','🏆'];

// ── HELPERS ───────────────────────────────────────────────────────────
function star(e){
  const s=document.createElement('div');s.className='star-pop';
  s.textContent=['⭐','🌟','✨','💫'][Math.floor(Math.random()*4)];
  s.style.left=(e?e.clientX-16:Math.random()*300)+'px';
  s.style.top=(e?e.clientY-16:200)+'px';
  document.body.appendChild(s);setTimeout(()=>s.remove(),850);
}
function buildDots(cur){
  const d=document.getElementById('dots');d.innerHTML='';
  PHASES.forEach((_,i)=>{
    const el=document.createElement('div');
    el.className='dot'+(i<cur?' done':i===cur?' active':'');
    d.appendChild(el);
  });
}
function card(html){
  const root=document.getElementById('root');root.innerHTML='';
  const c=document.createElement('div');c.className='card';c.innerHTML=html;
  root.appendChild(c);return c;
}
function prog(cur,tot){
  return`<div class="prog-wrap"><div class="prog-bar" style="width:${Math.round(cur/tot*100)}%"></div></div>`;
}
function nb(label,fn){
  const b=document.createElement('button');b.className='next-btn';b.textContent=label;
  b.onclick=fn;return b;
}
function nextPhase(){ph++;qi=0;renderGame();}

// ── RENDER ────────────────────────────────────────────────────────────
function renderGame(){
  buildDots(ph);
  const p=PHASES[ph];
  if(p==='learn') phLearn();
  else if(p==='w13a') phType(W13A,'Long o — oa · ow 拼寫練習');
  else if(p==='w13b') phBlend();
  else if(p==='w13c') phSort();
  else if(p==='w14a') phType(W14A,'Long u — ui · ue 拼寫練習');
  else if(p==='w14b') phPrefix();
  else phDone();
}

// ── PHASE: LEARN ──────────────────────────────────────────────────────
function phLearn(){
  const c=card(`
    <div class="phase-title">📖 本週規則一次看清楚！</div>

    <div class="learn-section">
      <h3 style="background:#fef3c7;color:#92400e">🅾 Long o — 三種拼法</h3>
      <div class="vowel-grid">
        <div class="vowel-card oa-c">
          <div class="pat">oa</div>
          <div class="words">boat · coat<br>road · toad<br>float · soap</div>
        </div>
        <div class="vowel-card ow-c">
          <div class="pat">ow</div>
          <div class="words">blow · show<br>snow · crow<br>slow · grow</div>
        </div>
        <div class="vowel-card oe-c">
          <div class="pat">oe</div>
          <div class="words">toe · doe<br>(字尾用)</div>
        </div>
      </div>
      <div style="background:#fef9c3;border-radius:8px;padding:8px 12px;font-size:.83rem;font-weight:700;color:#78350f">
        💡 oa → 通常在字的<strong>中間</strong>（如 b<u>oa</u>t）<br>
        💡 ow → 通常在字的<strong>結尾</strong>（如 bl<u>ow</u>）
      </div>
    </div>

    <div class="learn-section">
      <h3 style="background:#e0f2fe;color:#0c4a6e">🔵 Long u — 三種拼法</h3>
      <div class="vowel-grid">
        <div class="vowel-card ue-c">
          <div class="pat">ue</div>
          <div class="words">blue · true<br>due · clue<br>glue</div>
        </div>
        <div class="vowel-card ew-c">
          <div class="pat">ew</div>
          <div class="words">new · drew<br>flew · chew<br>grew · screw</div>
        </div>
        <div class="vowel-card ui-c">
          <div class="pat">ui</div>
          <div class="words">suit · fruit<br>juice · cruise</div>
        </div>
      </div>
      <div style="background:#e0f2fe;border-radius:8px;padding:8px 12px;font-size:.83rem;font-weight:700;color:#0c4a6e">
        💡 ue → 通常在字的<strong>結尾</strong>（如 bl<u>ue</u>）<br>
        💡 ui → 通常在字的<strong>中間</strong>（如 fr<u>ui</u>t）
      </div>
    </div>

    <div class="learn-section">
      <h3 style="background:#fef3c7;color:#92400e">✏️ Prefixes 前綴</h3>
      <div class="prefix-grid">
        <div class="prefix-card re-card">
          <h4>re- = again 再次</h4>
          <div class="ex">
            re<strong>play</strong> = play again<br>
            re<strong>fill</strong> = fill again<br>
            re<strong>try</strong> = try again<br>
            re<strong>grow</strong> = grow again<br>
            re<strong>set</strong> = set again<br>
            re<strong>tie</strong> = tie again
          </div>
        </div>
        <div class="prefix-card un-card">
          <h4>un- = not / opposite</h4>
          <div class="ex">
            un<strong>zip</strong> = open zip<br>
            un<strong>pack</strong> = take out<br>
            un<strong>lock</strong> = open lock<br>
            un<strong>do</strong> = reverse<br>
            un<strong>happy</strong> = not happy<br>
            un<strong>box</strong> = open box
          </div>
        </div>
      </div>
    </div>
  `);
  c.appendChild(nb('開始練習！→',()=>nextPhase()));
}

// ── PHASE: TYPING ─────────────────────────────────────────────────────
function phType(data, title){
  if(qi>=data.length){nextPhase();return;}
  typed=false;
  const q=data[qi];
  const c=card(`
    ${prog(qi,data.length)}
    <div class="phase-title">${title}</div>
    <div style="background:#fef9c3;border-radius:8px;padding:6px 10px;font-size:.8rem;font-weight:700;color:#78350f;text-align:center;margin-bottom:10px">
      📢 先把這個字念出來，再拼出來！
    </div>
    <div class="clue-box">
      <div class="clue-emoji">${q.emoji}</div>
      <div class="clue-zh">${q.zh}</div>
      <div class="clue-en">${q.en}</div>
      <div class="hint-pattern">✏️ 提示：${q.hint}</div>
    </div>
    <input class="type-input" id="ti" type="text" placeholder="Type the word here..." autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="feedback" id="fb"></div>
    <div class="counter">第 ${qi+1} / ${data.length} 題</div>
  `);
  const inp=c.querySelector('#ti');
  const checkFn=()=>{
    if(typed)return;
    typed=true;
    total++;
    const val=inp.value.trim().toLowerCase();
    const correct=q.answer.toLowerCase();
    const fb=c.querySelector('#fb');
    if(val===correct){
      inp.classList.add('ok');fb.className='feedback ok';
      fb.innerHTML='✅ '+q.explain;score++;star();
      setTimeout(()=>{qi++;phType(data,title);},1300);
    } else {
      inp.classList.add('err');fb.className='feedback bad';
      fb.innerHTML='❌ 正確是 <strong>'+q.answer+'</strong>　'+q.explain;
      wrongs.push({q:q.zh+' ('+q.en+')',a:q.answer,h:q.explain});
      setTimeout(()=>{qi++;phType(data,title);},1800);
    }
  };
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkFn();});
  c.appendChild(nb('✅ 送出答案',checkFn));
  setTimeout(()=>inp.focus(),200);
}

// ── PHASE: BLENDS (w13b) ──────────────────────────────────────────────
function phBlend(){
  if(qi>=W13B.length){nextPhase();return;}
  const q=W13B[qi];
  const c=card(`
    ${prog(qi,W13B.length)}
    <div class="phase-title">W13B — 圈出正確的字！</div>
    <div style="background:#fef9c3;border-radius:8px;padding:8px 12px;font-size:.85rem;font-weight:700;color:#78350f;text-align:center;margin-bottom:12px">
      📢 把三個字都念出來，圈出符合意思的那個！
    </div>
    <div style="text-align:center;background:#f0f9ff;border:2px dashed #38bdf8;border-radius:12px;padding:14px;margin-bottom:12px;font-family:'Fredoka One',cursive;font-size:1.2rem;color:#0369a1">${q.clue}</div>
    <div class="word-opts" id="opts"></div>
    <div class="feedback" id="fb"></div>
    <div class="counter">第 ${qi+1} / ${W13B.length} 題</div>
  `);
  const og=c.querySelector('#opts');
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');b.className='word-opt';b.textContent=o;
    b.onclick=ev=>{
      if(b.disabled)return;
      og.querySelectorAll('.word-opt').forEach(x=>x.disabled=true);
      total++;
      const fb=c.querySelector('#fb');
      if(i===q.ans){
        b.classList.add('correct');fb.className='feedback ok';
        fb.innerHTML='✅ '+q.explain;score++;star(ev);
        setTimeout(()=>{qi++;phBlend();},1200);
      } else {
        b.classList.add('wrong');fb.className='feedback bad';
        fb.innerHTML='❌ 正確是 <strong>'+q.opts[q.ans]+'</strong>　'+q.explain;
        wrongs.push({q:q.clue,a:q.opts[q.ans],h:q.explain});
        setTimeout(()=>{qi++;phBlend();},1700);
      }
    };
    og.appendChild(b);
  });
}

// ── PHASE: SORT oa/ow/oe ─────────────────────────────────────────────
function phSort(){
  if(qi>=W13C.length){nextPhase();return;}
  const q=W13C[qi];
  const c=card(`
    ${prog(qi,W13C.length)}
    <div class="phase-title">W13C — 這個字用 oa、ow 還是 oe？</div>
    <div class="sort-word-display">${q.word}</div>
    <div style="text-align:center;font-size:.82rem;color:#0369a1;font-weight:700;margin-bottom:10px">
      📢 先念出來，再選正確的拼法！
    </div>
    <div class="sort-bucket-row" id="buckets"></div>
    <div class="feedback" id="fb"></div>
    <div class="counter">第 ${qi+1} / ${W13C.length} 題</div>
  `);
  const br=c.querySelector('#buckets');
  [['oa','bucket-oa'],['ow','bucket-ow'],['oe','bucket-oe']].forEach(([v,cls])=>{
    const b=document.createElement('button');
    b.className='bucket-btn '+cls;b.textContent=v;
    b.onclick=ev=>{
      if(b.disabled)return;
      br.querySelectorAll('.bucket-btn').forEach(x=>x.disabled=true);
      total++;
      const fb=c.querySelector('#fb');
      if(v===q.bucket){
        b.style.outline='3px solid #16a34a';
        fb.className='feedback ok';fb.innerHTML='✅ '+q.explain;
        score++;star(ev);
        setTimeout(()=>{qi++;phSort();},1200);
      } else {
        b.style.background='#fee2e2';b.style.borderColor='#f87171';
        fb.className='feedback bad';fb.innerHTML='❌ <strong>'+q.word+'</strong> 用 <strong>'+q.bucket+'</strong>　'+q.explain;
        wrongs.push({q:q.word,a:q.bucket,h:q.explain});
        setTimeout(()=>{qi++;phSort();},1700);
      }
    };
    br.appendChild(b);
  });
}

// ── PHASE: PREFIX ─────────────────────────────────────────────────────
function phPrefix(){
  if(qi>=W14B.length){nextPhase();return;}
  const q=W14B[qi];
  const c=card(`
    ${prog(qi,W14B.length)}
    <div class="phase-title">W14B — re- 還是 un-？</div>
    <div class="prefix-q-box">
      <div class="prefix-blank">___ ${q.word}</div>
      <div style="font-size:.88rem;color:#64748b;font-weight:700;margin-top:6px">意思：${q.meaning}</div>
    </div>
    <div class="prefix-btn-row" id="pbtns"></div>
    <div class="feedback" id="fb"></div>
    <div class="counter">第 ${qi+1} / ${W14B.length} 題</div>
  `);
  const pr=c.querySelector('#pbtns');
  [['re-','re-btn'],['un-','un-btn']].forEach(([v,cls])=>{
    const b=document.createElement('button');
    b.className='prefix-btn '+cls;b.textContent=v;
    b.onclick=ev=>{
      if(b.disabled)return;
      pr.querySelectorAll('.prefix-btn').forEach(x=>x.disabled=true);
      total++;
      const fb=c.querySelector('#fb');
      const ans=q.prefix+'-';
      if(v===ans){
        b.style.outline='3px solid #16a34a';
        fb.className='feedback ok';fb.innerHTML='✅ <strong>'+v+q.word+'</strong>　'+q.explain;
        score++;star(ev);
        setTimeout(()=>{qi++;phPrefix();},1300);
      } else {
        b.style.background='#fee2e2';b.style.borderColor='#f87171';
        fb.className='feedback bad';fb.innerHTML='❌ 正確是 <strong>'+ans+q.word+'</strong>　'+q.explain;
        wrongs.push({q:'___ '+q.word,a:ans+q.word,h:q.explain});
        setTimeout(()=>{qi++;phPrefix();},1700);
      }
    };
    pr.appendChild(b);
  });
}

// ── DONE ──────────────────────────────────────────────────────────────
function phDone(){
  const pct=total?Math.round(score/total*100):100;
  const emoji=pct>=90?'🌟':pct>=70?'😊':'💪';
  let wHtml='';
  if(wrongs.length){
    wHtml='<div style="margin-top:14px"><div style="font-family:Fredoka One,cursive;color:#dc2626;margin-bottom:8px">Review ✏️</div><ul class="wrong-list">';
    wrongs.forEach(w=>{wHtml+=`<li class="wrong-item"><div class="wr-q">${w.q}</div><div class="wr-a">✅ ${w.a}</div><div class="wr-h">💡 ${w.h}</div></li>`;});
    wHtml+='</ul></div>';
  }
  const c=card(`
    <div class="score-wrap">
      <div style="font-size:3rem">${emoji}</div>
      <div class="score-num">${score} / ${total}</div>
      <div style="color:#64748b;font-size:.88rem">${pct}% — ${pct>=90?'Excellent! 🎉':pct>=70?'Good job! 👍':'Keep practicing! 💪'}</div>
    </div>${wHtml}`);
  c.appendChild(nb('再玩一次 🔄',()=>{ph=0;qi=0;score=0;total=0;wrongs=[];renderGame();}));
}

renderGame();
</script>
