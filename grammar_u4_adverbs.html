<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💨 Adverbs Challenge!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#fff8f0;font-family:'Nunito',sans-serif;min-height:100vh;}
  .wrap{max-width:520px;margin:0 auto;padding:16px 16px 60px;}
  .g-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .g-title{font-family:'Fredoka One',cursive;font-size:1.3rem;color:#333;}
  .g-prog{font-family:'Fredoka One',cursive;font-size:1rem;color:#aaa;}
  .pbar-wrap{background:#eee;border-radius:99px;height:8px;margin-bottom:14px;overflow:hidden;}
  .pbar-fill{height:100%;border-radius:99px;transition:width .4s;}
  .score-row{display:flex;justify-content:space-between;margin-bottom:10px;}
  .score-label{font-family:'Fredoka One',cursive;font-size:.9rem;color:#aaa;}
  .score-val{font-family:'Fredoka One',cursive;font-size:.9rem;color:#34d399;}
  .learn-card{background:white;border-radius:20px;padding:20px 18px;box-shadow:0 6px 20px rgba(0,0,0,.08);margin-bottom:14px;}
  .learn-title{font-family:'Fredoka One',cursive;font-size:1.1rem;text-align:center;margin-bottom:12px;}
  .rule-box{border-radius:12px;padding:12px 14px;font-size:.88rem;font-weight:700;line-height:1.8;margin-bottom:10px;}
  .rule-how{background:#fef3c7;color:#92400e;border-left:4px solid #f59e0b;}
  .rule-when{background:#eff6ff;color:#1e40af;border-left:4px solid #3b82f6;}
  .rule-where{background:#f0fdf4;color:#065f46;border-left:4px solid #10b981;}
  .adv-chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.82rem;font-weight:800;margin:2px;}
  .adv-how{background:#fde68a;color:#92400e;}
  .adv-when{background:#bfdbfe;color:#1e40af;}
  .adv-where{background:#bbf7d0;color:#065f46;}
  .adv-hl{background:#fef3c7;color:#b45309;font-weight:900;padding:1px 5px;border-radius:4px;}
  .phase-label{font-family:'Fredoka One',cursive;font-size:.8rem;letter-spacing:2px;text-transform:uppercase;border-radius:20px;padding:4px 14px;display:inline-block;margin-bottom:12px;}
  .pl-find{background:#fef3c7;color:#92400e;}
  .pl-fill{background:#f0fdf4;color:#065f46;}
  .pl-type{background:#eff6ff;color:#1e40af;}
  .q-card{background:white;border-radius:20px;padding:22px 18px;box-shadow:0 6px 20px rgba(0,0,0,.08);margin-bottom:14px;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
  .q-card.shake{animation:shake .35s ease;}
  @keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .q-emoji{font-size:2.4rem;display:block;text-align:center;margin-bottom:10px;}
  .q-sentence{font-size:1rem;font-weight:800;color:#222;text-align:center;line-height:2;margin-bottom:8px;}
  .q-blank{display:inline-block;min-width:80px;border-bottom:3px solid #f59e0b;color:#f59e0b;font-weight:900;text-align:center;padding:0 4px;}
  .q-hint{font-size:.82rem;color:#aaa;font-weight:700;text-align:center;margin-bottom:14px;}
  .word-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px;}
  .word-btn{padding:8px 16px;border-radius:30px;border:2.5px solid #f59e0b;background:#fffbeb;font-family:'Fredoka One',cursive;font-size:1rem;color:#92400e;cursor:pointer;transition:all .15s;}
  .word-btn:hover{background:#fef3c7;transform:scale(1.05);}
  .word-btn.correct{background:#d1fae5;border-color:#34d399;color:#065f46;}
  .word-btn.wrong{background:#fee2e2;border-color:#fca5a5;color:#991b1b;}
  .word-btn:disabled{opacity:.5;pointer-events:none;}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .opts-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .opt-btn{padding:12px 8px;border-radius:14px;border:3px solid #eee;background:#f9f9f9;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;transition:all .15s;text-align:center;color:#334155;}
  .opt-btn:hover{border-color:#f59e0b;background:#fffbeb;color:#92400e;transform:translateY(-2px);}
  .opt-btn.correct{background:#d1fae5;border-color:#34d399;color:#065f46;}
  .opt-btn.wrong{background:#fee2e2;border-color:#fca5a5;color:#991b1b;}
  .opt-btn:disabled{cursor:default;transform:none;}
  .dots{display:flex;justify-content:center;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
  .dot{width:10px;height:10px;border-radius:50%;background:#e5e7eb;transition:all .3s;}
  .dot.curr{background:#f59e0b;transform:scale(1.4);}
  .dot.ok{background:#34d399;}
  .dot.bad{background:#f87171;}
  .feedback{border-radius:14px;padding:12px 16px;margin-bottom:12px;font-weight:800;font-size:.92rem;display:none;text-align:center;line-height:1.5;}
  .feedback.show{display:block;}
  .feedback.ok{background:#d1fae5;color:#065f46;border:3px solid #6ee7b7;}
  .feedback.bad{background:#fee2e2;color:#991b1b;border:3px solid #fca5a5;}
  .next-btn{width:100%;padding:15px;border-radius:50px;border:none;background:linear-gradient(135deg,#f59e0b,#f97316);color:white;font-family:'Fredoka One',cursive;font-size:1.2rem;cursor:pointer;display:none;box-shadow:0 4px 14px rgba(245,158,11,.35);transition:transform .1s;}
  .next-btn.show{display:block;}
  .next-btn:active{transform:scale(.97);}
  .final-card{background:white;border-radius:24px;padding:30px 22px;text-align:center;box-shadow:0 8px 28px rgba(0,0,0,.1);display:none;}
  .final-card.show{display:block;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
  .final-title{font-family:'Fredoka One',cursive;font-size:2rem;color:#f59e0b;margin-bottom:6px;}
  .final-score{font-family:'Fredoka One',cursive;font-size:3rem;color:#f97316;}
  .final-stars{font-size:2.2rem;letter-spacing:4px;margin:6px 0 12px;}
  .final-msg{font-size:.95rem;color:#666;font-weight:700;margin-bottom:20px;line-height:1.6;}
  .wrong-rev{background:#fffbeb;border-radius:12px;padding:14px;margin-bottom:18px;text-align:left;}
  .wr-title{font-family:'Fredoka One',cursive;font-size:.9rem;color:#92400e;margin-bottom:8px;}
  .wr-item{font-size:.82rem;font-weight:700;color:#555;padding:4px 0;border-bottom:1px solid #f5f5f5;line-height:1.5;}
  .wr-ans{color:#059669;font-weight:900;}
  .final-btns{display:flex;flex-direction:column;gap:10px;}
  .retry-btn{padding:14px;border-radius:50px;border:none;background:linear-gradient(135deg,#f59e0b,#f97316);color:white;font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;}
  .star-pop{position:fixed;font-size:1.8rem;pointer-events:none;animation:fly .9s ease-out forwards;z-index:999;}
  @keyframes fly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.5)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="g-header">
    <div class="g-title" id="gTitle">💨 Adverbs!</div>
    <div class="g-prog" id="gProg"></div>
  </div>
  <div class="pbar-wrap"><div class="pbar-fill" id="pbarFill" style="width:0%"></div></div>
  <div class="score-row">
    <div class="score-label" id="scoreLabel"></div>
    <div class="score-val" id="scoreVal"></div>
  </div>
  <div id="content"></div>
  <div class="dots" id="dots"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="handleNext()"></button>
  <div class="final-card" id="finalCard"></div>
</div>
<script>
// Part 2: Find the adverb — click the adverb word in the sentence
const FIND_QS = [
  {words:['The','cheetah','runs','quickly','.'], adv:'quickly', emoji:'🐆', explain:'quickly tells HOW the cheetah runs → adverb (副詞)'},
  {words:['She','sings','loudly','in','the','shower','.'], adv:'loudly', emoji:'🚿', explain:'loudly tells HOW she sings → adverb (副詞)'},
  {words:['We','go','to','school','daily','.'], adv:'daily', emoji:'🏫', explain:'daily tells WHEN we go → adverb (副詞)'},
  {words:['The','baby','sleeps','quietly','.'], adv:'quietly', emoji:'😴', explain:'quietly tells HOW the baby sleeps → adverb (副詞)'},
  {words:['He','will','come','soon','.'], adv:'soon', emoji:'⏰', explain:'soon tells WHEN he will come → adverb (副詞)'},
  {words:['Mom','always','makes','breakfast','.'], adv:'always', emoji:'🍳', explain:'always tells WHEN/how often → adverb (副詞)'},
  {words:['The','dog','barked','fiercely','.'], adv:'fiercely', emoji:'🐕', explain:'fiercely tells HOW the dog barked → adverb (副詞)'},
  {words:['I','never','forget','my','homework','.'], adv:'never', emoji:'📓', explain:'never tells WHEN/how often → adverb (副詞)'},
  {words:['The','bird','flew','high','.'], adv:'high', emoji:'🐦', explain:'high tells WHERE the bird flew → adverb (副詞)'},
  {words:['She','happily','opened','her','gift','.'], adv:'happily', emoji:'🎁', explain:'happily tells HOW she opened her gift → adverb (副詞)'},
];

// Part 3: Fill in the blank with the correct adverb
const FILL_QS = [
  {sentence:'The turtle moves very ___.', ans:'slowly', opts:['slowly','fast','loud','high'], emoji:'🐢', explain:'slowly — HOW the turtle moves (副詞描述動詞)'},
  {sentence:'Please speak ___ in the library.', ans:'quietly', opts:['quietly','loudly','fast','angrily'], emoji:'📚', explain:'quietly — HOW to speak (副詞描述動詞)'},
  {sentence:'She ___ brushes her teeth before bed.', ans:'always', opts:['never','always','soon','quietly'], emoji:'🦷', explain:'always — WHEN/how often (表示頻率的副詞)'},
  {sentence:'The fireworks went up very ___.', ans:'high', opts:['high','slowly','quietly','soon'], emoji:'🎆', explain:'high — WHERE the fireworks went (副詞描述動詞)'},
  {sentence:'Dad will be home ___.', ans:'soon', opts:['never','loudly','soon','quickly'], emoji:'🏠', explain:'soon — WHEN dad will be home (時間副詞)'},
  {sentence:'The rabbit hopped ___ across the field.', ans:'quickly', opts:['slowly','quickly','loudly','never'], emoji:'🐇', explain:'quickly — HOW the rabbit hopped (副詞描述動詞)'},
  {sentence:'I ___ eat vegetables. I love them!', ans:'always', opts:['never','always','soon','quietly'], emoji:'🥦', explain:'always — how often (頻率副詞)'},
  {sentence:'She smiled ___ when she won the prize.', ans:'happily', opts:['sadly','angrily','happily','quietly'], emoji:'🏆', explain:'happily — HOW she smiled (副詞描述動詞)'},
];

// Part 4: What kind of adverb? (HOW / WHEN / WHERE)
const TYPE_QS = [
  {sentence:'The lion roared loudly.', adv:'loudly', ans:'HOW', emoji:'🦁', explain:'loudly → HOW the lion roared'},
  {sentence:'We went there yesterday.', adv:'yesterday', ans:'WHEN', emoji:'📅', explain:'yesterday → WHEN we went'},
  {sentence:'She put the book here.', adv:'here', ans:'WHERE', emoji:'📖', explain:'here → WHERE she put the book'},
  {sentence:'He always eats breakfast.', adv:'always', ans:'WHEN', emoji:'🍞', explain:'always → WHEN (how often) he eats'},
  {sentence:'The cat jumped high.', adv:'high', ans:'WHERE', emoji:'🐱', explain:'high → WHERE the cat jumped'},
  {sentence:'Run quickly!', adv:'quickly', ans:'HOW', emoji:'🏃', explain:'quickly → HOW to run'},
  {sentence:'They will arrive soon.', adv:'soon', ans:'WHEN', emoji:'🚂', explain:'soon → WHEN they will arrive'},
  {sentence:'She searched everywhere.', adv:'everywhere', ans:'WHERE', emoji:'🔍', explain:'everywhere → WHERE she searched'},
];

let phase = 'learn';
let qi = 0, score = 0, wrong = [], answered = false;
let currentQ = [];

function setPbar(pct, color) {
  const el = document.getElementById('pbarFill');
  el.style.background = color; el.style.width = pct + '%';
}
function clearFb() { document.getElementById('feedback').className = 'feedback'; }
function fb(msg, type) { const el = document.getElementById('feedback'); el.innerHTML = msg; el.className = 'feedback show ' + type; }

function showLearn() {
  phase = 'learn'; clearFb();
  document.getElementById('gTitle').textContent = '💨 Adverbs!';
  document.getElementById('gProg').textContent = 'Part 1 / 4';
  document.getElementById('scoreLabel').textContent = '';
  document.getElementById('scoreVal').textContent = '';
  document.getElementById('dots').innerHTML = '';
  document.getElementById('finalCard').classList.remove('show');
  setPbar(8, 'linear-gradient(90deg,#f59e0b,#f97316)');
  document.getElementById('nextBtn').textContent = 'Start Part 2: Find the Adverb! 🔍';
  document.getElementById('nextBtn').className = 'next-btn show';
  document.getElementById('content').innerHTML = `
    <div class="learn-card">
      <div class="learn-title" style="color:#92400e">💨 Adverbs 副詞</div>
      <p style="font-size:.85rem;color:#666;font-weight:700;text-align:center;margin-bottom:12px;">An adverb describes a VERB — it tells us more about the action!<br>副詞用來描述動詞，說明動作的樣子。</p>
      <div class="rule-box rule-how">
        🟡 <b>HOW</b> — 怎麼做的？<br>
        Many end in <b>-ly</b>!<br>
        <span class="adv-chip adv-how">quickly</span>
        <span class="adv-chip adv-how">slowly</span>
        <span class="adv-chip adv-how">loudly</span>
        <span class="adv-chip adv-how">quietly</span>
        <span class="adv-chip adv-how">happily</span>
        <span class="adv-chip adv-how">fiercely</span>
      </div>
      <div class="rule-box rule-when">
        🔵 <b>WHEN</b> — 什麼時候？<br>
        <span class="adv-chip adv-when">yesterday</span>
        <span class="adv-chip adv-when">today</span>
        <span class="adv-chip adv-when">tomorrow</span>
        <span class="adv-chip adv-when">soon</span>
        <span class="adv-chip adv-when">always</span>
        <span class="adv-chip adv-when">never</span>
        <span class="adv-chip adv-when">daily</span>
      </div>
      <div class="rule-box rule-where">
        🟢 <b>WHERE</b> — 在哪裡？<br>
        <span class="adv-chip adv-where">here</span>
        <span class="adv-chip adv-where">there</span>
        <span class="adv-chip adv-where">high</span>
        <span class="adv-chip adv-where">everywhere</span>
        <span class="adv-chip adv-where">outside</span>
      </div>
    </div>`;
}

function startFind() {
  phase = 'find'; score = 0; wrong = []; qi = 0; answered = false;
  currentQ = [...FIND_QS].sort(() => Math.random() - .5).slice(0, 8);
  document.getElementById('gTitle').textContent = '🔍 Find the Adverb!';
  document.getElementById('gProg').textContent = 'Part 2 / 4';
  buildDots(currentQ.length); showFindQ();
}

function showFindQ() {
  answered = false;
  const q = currentQ[qi]; const total = currentQ.length;
  setPbar(12 + (qi / total) * 20, 'linear-gradient(90deg,#f59e0b,#f97316)');
  document.getElementById('scoreLabel').textContent = `Question ${qi+1} / ${total}`;
  document.getElementById('scoreVal').textContent = `✅ ${score} ❌ ${wrong.length}`;
  clearFb(); document.getElementById('nextBtn').className = 'next-btn';
  const wordsHTML = q.words.map(w => {
    const clean = w.replace('.','');
    if (clean === q.adv) return `<button class="word-btn" data-val="${clean}" onclick="pickWord(this,'${q.adv}',${qi})">${w}</button>`;
    return `<button class="word-btn" data-val="${clean}" onclick="pickWord(this,'${q.adv}',${qi})">${w}</button>`;
  }).join('');
  document.getElementById('content').innerHTML = `
    <div class="phase-label pl-find">🔍 Click the Adverb!</div>
    <div class="q-card" id="qCard">
      <span class="q-emoji">${q.emoji}</span>
      <div class="q-hint">Click on the <b>adverb</b> in the sentence below.<br>點出這個句子裡的副詞！</div>
      <div class="word-row">${wordsHTML}</div>
    </div>`;
  updateDot(qi, 'curr');
}

function pickWord(btn, adv, qiAtClick) {
  if (answered || qiAtClick !== qi) return; answered = true;
  const q = currentQ[qi]; const val = btn.dataset.val;
  document.querySelectorAll('.word-btn').forEach(b => b.disabled = true);
  if (val === adv) {
    btn.classList.add('correct'); score++; popStars();
    fb(`✅ <b>${adv}</b> — ${q.explain}`, 'ok'); updateDot(qi, 'ok');
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.word-btn').forEach(b => { if (b.dataset.val === adv) b.classList.add('correct'); });
    wrong.push(q);
    fb(`❌ The adverb is <b>${adv}</b> — ${q.explain}`, 'bad');
    document.getElementById('qCard')?.classList.add('shake');
    setTimeout(() => document.getElementById('qCard')?.classList.remove('shake'), 400);
    updateDot(qi, 'bad');
  }
  document.getElementById('scoreVal').textContent = `✅ ${score} ❌ ${wrong.length}`;
  const nb = document.getElementById('nextBtn');
  nb.textContent = qi === currentQ.length - 1 ? 'Next Part ➡️' : 'Next ➡️';
  nb.className = 'next-btn show';
}

function startFill() {
  phase = 'fill'; score = 0; wrong = []; qi = 0; answered = false;
  currentQ = [...FILL_QS].sort(() => Math.random() - .5);
  document.getElementById('gTitle').textContent = '✏️ Fill in the Adverb!';
  document.getElementById('gProg').textContent = 'Part 3 / 4';
  buildDots(currentQ.length); showFillQ();
}

function showFillQ() {
  answered = false;
  const q = currentQ[qi]; const total = currentQ.length;
  setPbar(36 + (qi / total) * 20, 'linear-gradient(90deg,#f59e0b,#f97316)');
  document.getElementById('scoreLabel').textContent = `Question ${qi+1} / ${total}`;
  document.getElementById('scoreVal').textContent = `✅ ${score} ❌ ${wrong.length}`;
  clearFb(); document.getElementById('nextBtn').className = 'next-btn';
  const sentHTML = q.sentence.replace('___', `<span class="q-blank">___</span>`);
  const optsHTML = q.opts.map(o =>
    `<button class="opt-btn" data-val="${o}" onclick="pickFill(this)">${o}</button>`
  ).join('');
  document.getElementById('content').innerHTML = `
    <div class="phase-label pl-fill">✏️ Choose the Adverb</div>
    <div class="q-card" id="qCard">
      <span class="q-emoji">${q.emoji}</span>
      <div class="q-sentence">${sentHTML}</div>
      <div class="opts">${optsHTML}</div>
    </div>`;
  updateDot(qi, 'curr');
}

function pickFill(btn) {
  if (answered) return; answered = true;
  const q = currentQ[qi]; const val = btn.dataset.val;
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  if (val === q.ans) {
    btn.classList.add('correct'); score++; popStars();
    fb(`✅ <b>${q.ans}</b> — ${q.explain}`, 'ok'); updateDot(qi, 'ok');
  } else {
    btn.classList.add('wrong');
    document.querySelector(`[data-val="${q.ans}"]`).classList.add('correct');
    wrong.push(q);
    fb(`❌ Answer: <b>${q.ans}</b> — ${q.explain}`, 'bad');
    document.getElementById('qCard')?.classList.add('shake');
    setTimeout(() => document.getElementById('qCard')?.classList.remove('shake'), 400);
    updateDot(qi, 'bad');
  }
  document.getElementById('scoreVal').textContent = `✅ ${score} ❌ ${wrong.length}`;
  const nb = document.getElementById('nextBtn');
  nb.textContent = qi === currentQ.length - 1 ? 'Next Part ➡️' : 'Next ➡️';
  nb.className = 'next-btn show';
}

function startType() {
  phase = 'type'; score = 0; wrong = []; qi = 0; answered = false;
  currentQ = [...TYPE_QS].sort(() => Math.random() - .5);
  document.getElementById('gTitle').textContent = '🤔 HOW / WHEN / WHERE?';
  document.getElementById('gProg').textContent = 'Part 4 / 4';
  buildDots(currentQ.length); showTypeQ();
}

function showTypeQ() {
  answered = false;
  const q = currentQ[qi]; const total = currentQ.length;
  setPbar(60 + (qi / total) * 32, 'linear-gradient(90deg,#3b82f6,#1d4ed8)');
  document.getElementById('scoreLabel').textContent = `Question ${qi+1} / ${total}`;
  document.getElementById('scoreVal').textContent = `✅ ${score} ❌ ${wrong.length}`;
  clearFb(); document.getElementById('nextBtn').className = 'next-btn';
  const sentHTML = q.sentence.replace(q.adv, `<span class="adv-hl">${q.adv}</span>`);
  document.getElementById('content').innerHTML = `
    <div class="phase-label pl-type">🤔 What kind of adverb?</div>
    <div class="q-card" id="qCard">
      <span class="q-emoji">${q.emoji}</span>
      <div class="q-sentence">${sentHTML}</div>
      <div class="q-hint">The highlighted word is an adverb. Does it tell HOW, WHEN, or WHERE?</div>
      <div class="opts-3">
        <button class="opt-btn" data-val="HOW" onclick="pickType(this)" style="color:#92400e;border-color:#f59e0b">🟡 HOW</button>
        <button class="opt-btn" data-val="WHEN" onclick="pickType(this)" style="color:#1e40af;border-color:#3b82f6">🔵 WHEN</button>
        <button class="opt-btn" data-val="WHERE" onclick="pickType(this)" style="color:#065f46;border-color:#10b981">🟢 WHERE</button>
      </div>
    </div>`;
  updateDot(qi, 'curr');
}

function pickType(btn) {
  if (answered) return; answered = true;
  const q = currentQ[qi]; const val = btn.dataset.val;
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  if (val === q.ans) {
    btn.classList.add('correct'); score++; popStars();
    fb(`✅ <b>${q.ans}</b> — ${q.explain}`, 'ok'); updateDot(qi, 'ok');
  } else {
    btn.classList.add('wrong');
    document.querySelector(`[data-val="${q.ans}"]`).classList.add('correct');
    wrong.push(q);
    fb(`❌ Answer: <b>${q.ans}</b> — ${q.explain}`, 'bad');
    document.getElementById('qCard')?.classList.add('shake');
    setTimeout(() => document.getElementById('qCard')?.classList.remove('shake'), 400);
    updateDot(qi, 'bad');
  }
  document.getElementById('scoreVal').textContent = `✅ ${score} ❌ ${wrong.length}`;
  const nb = document.getElementById('nextBtn');
  nb.textContent = qi === currentQ.length - 1 ? 'See Results! 🎊' : 'Next ➡️';
  nb.className = 'next-btn show';
}

function handleNext() {
  qi++;
  if (phase === 'learn') { startFind(); return; }
  if (phase === 'find') { if (qi < currentQ.length) showFindQ(); else { qi=0; startFill(); } return; }
  if (phase === 'fill') { if (qi < currentQ.length) showFillQ(); else { qi=0; startType(); } return; }
  if (phase === 'type') { if (qi < currentQ.length) showTypeQ(); else showFinal(); return; }
}

function showFinal() {
  document.getElementById('dots').innerHTML = '';
  clearFb(); document.getElementById('content').innerHTML = '';
  document.getElementById('nextBtn').className = 'next-btn';
  document.getElementById('pbarFill').style.width = '100%';
  const stars = score >= 18 ? '⭐⭐⭐' : score >= 12 ? '⭐⭐' : '⭐';
  const msg = score >= 18 ? 'Adverb Master! You know HOW, WHEN and WHERE! 🏆' : score >= 12 ? 'Great job! Keep going!' : 'Good try! Review and play again!';
  const wrongHtml = wrong.length > 0 ? `
    <div class="wrong-rev">
      <div class="wr-title">📝 Review these adverbs:</div>
      ${wrong.map(q => `<div class="wr-item"><span class="wr-ans">${q.adv || q.ans}</span> — ${q.explain}</div>`).join('')}
    </div>` : '';
  document.getElementById('finalCard').innerHTML = `
    <div class="final-title">💨 Done!</div>
    <div class="final-score">${score} ⭐</div>
    <div class="final-stars">${stars}</div>
    <div class="final-msg">${msg}</div>
    ${wrongHtml}
    <div class="final-btns"><button class="retry-btn" onclick="showLearn()">🔄 Play Again</button></div>`;
  document.getElementById('finalCard').classList.add('show');
  for (let i = 0; i < 4; i++) setTimeout(popStars, i * 200);
}

function buildDots(n) {
  const c = document.getElementById('dots'); c.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i===0?' curr':''); d.id='dot'+i; c.appendChild(d);
  }
}
function updateDot(i, state) {
  const d = document.getElementById('dot'+i); if(!d) return;
  d.className='dot '+state;
  const next = document.getElementById('dot'+(i+1));
  if(next) next.classList.add('curr');
}
function popStars() {
  const e=['⭐','✨','💨','🌟','🎉'];
  for(let i=0;i<5;i++) setTimeout(()=>{
    const s=document.createElement('div'); s.className='star-pop';
    s.textContent=e[Math.floor(Math.random()*e.length)];
    s.style.left=(10+Math.random()*80)+'vw';
    s.style.top=(20+Math.random()*50)+'vh';
    document.body.appendChild(s); setTimeout(()=>s.remove(),900);
  },i*120);
}

window.onload = showLearn;
</script>
</body>
</html>
