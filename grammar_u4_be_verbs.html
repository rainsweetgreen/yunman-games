<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🟣 Be Verbs Challenge!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#fff8f0;font-family:'Nunito',sans-serif;min-height:100vh;}
  .wrap{max-width:520px;margin:0 auto;padding:16px 16px 60px;}
  .g-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .g-title{font-family:'Fredoka One',cursive;font-size:1.3rem;color:#333;}
  .g-prog{font-family:'Fredoka One',cursive;font-size:1rem;color:#aaa;}
  .pbar-wrap{background:#eee;border-radius:99px;height:8px;margin-bottom:14px;overflow:hidden;}
  .pbar-fill{height:100%;border-radius:99px;transition:width .4s;}
  .score-row{display:flex;justify-content:space-between;margin-bottom:10px;}
  .score-label{font-family:'Fredoka One',cursive;font-size:.9rem;color:#aaa;}
  .score-val{font-family:'Fredoka One',cursive;font-size:.9rem;color:#34d399;}
  .learn-card{background:white;border-radius:20px;padding:20px 18px;box-shadow:0 6px 20px rgba(0,0,0,.08);margin-bottom:14px;}
  .learn-title{font-family:'Fredoka One',cursive;font-size:1.1rem;text-align:center;margin-bottom:14px;}
  .rule-box{border-radius:12px;padding:12px 14px;font-size:.88rem;font-weight:700;line-height:1.7;margin-bottom:10px;}
  .rule-pres{background:#f3e8ff;color:#5b21b6;border-left:4px solid #7c3aed;}
  .rule-past{background:#fef3c7;color:#92400e;border-left:4px solid #f59e0b;}
  .ex-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .ex-chip{padding:3px 10px;border-radius:20px;font-size:.82rem;font-weight:800;}
  .ec-pr{background:#ddd6fe;color:#5b21b6;}
  .ec-pa{background:#fde68a;color:#92400e;}
  .table-box{background:#fafafa;border-radius:12px;overflow:hidden;margin-top:8px;border:2px solid #e5e7eb;}
  .table-box table{width:100%;border-collapse:collapse;font-size:.85rem;}
  .table-box th{background:#7c3aed;color:white;padding:7px 10px;font-family:'Fredoka One',cursive;font-weight:400;}
  .table-box td{padding:7px 10px;border-bottom:1px solid #f0f0f0;text-align:center;}
  .table-box tr:last-child td{border-bottom:none;}
  .v-am{color:#7c3aed;font-weight:900;}
  .v-is{color:#db2777;font-weight:900;}
  .v-are{color:#059669;font-weight:900;}
  .v-was{color:#d97706;font-weight:900;}
  .v-were{color:#2563eb;font-weight:900;}
  .phase-label{font-family:'Fredoka One',cursive;font-size:.8rem;letter-spacing:2px;text-transform:uppercase;border-radius:20px;padding:4px 14px;display:inline-block;margin-bottom:12px;}
  .pl-pres{background:#ede9fe;color:#5b21b6;}
  .pl-past{background:#fef3c7;color:#92400e;}
  .pl-mix{background:#f0fdf4;color:#065f46;}
  .q-card{background:white;border-radius:20px;padding:22px 18px;box-shadow:0 6px 20px rgba(0,0,0,.08);margin-bottom:14px;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
  .q-card.shake{animation:shake .35s ease;}
  @keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .q-emoji{font-size:2.4rem;display:block;text-align:center;margin-bottom:10px;}
  .q-sentence{font-size:1.1rem;font-weight:800;color:#222;text-align:center;line-height:2;margin-bottom:14px;}
  .q-blank{display:inline-block;min-width:70px;border-bottom:3px solid #7c3aed;color:#7c3aed;font-weight:900;text-align:center;padding:0 4px;}
  .q-hint{font-size:.82rem;color:#aaa;font-weight:700;text-align:center;margin-bottom:14px;}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .opts-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .opt-btn{padding:13px 10px;border-radius:14px;border:3px solid #eee;background:#f9f9f9;font-family:'Fredoka One',cursive;font-size:1.05rem;cursor:pointer;transition:all .15s;text-align:center;color:#334155;}
  .opt-btn:hover{border-color:#7c3aed;background:#f3e8ff;color:#5b21b6;transform:translateY(-2px);}
  .opt-btn.correct{background:#d1fae5;border-color:#34d399;color:#065f46;}
  .opt-btn.wrong{background:#fee2e2;border-color:#fca5a5;color:#991b1b;}
  .opt-btn:disabled{cursor:default;transform:none;}
  .dots{display:flex;justify-content:center;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
  .dot{width:10px;height:10px;border-radius:50%;background:#e5e7eb;transition:all .3s;}
  .dot.curr{background:#7c3aed;transform:scale(1.4);}
  .dot.ok{background:#34d399;}
  .dot.bad{background:#f87171;}
  .feedback{border-radius:14px;padding:12px 16px;margin-bottom:12px;font-weight:800;font-size:.95rem;display:none;text-align:center;line-height:1.5;}
  .feedback.show{display:block;}
  .feedback.ok{background:#d1fae5;color:#065f46;border:3px solid #6ee7b7;}
  .feedback.bad{background:#fee2e2;color:#991b1b;border:3px solid #fca5a5;}
  .next-btn{width:100%;padding:15px;border-radius:50px;border:none;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:white;font-family:'Fredoka One',cursive;font-size:1.2rem;cursor:pointer;display:none;box-shadow:0 4px 14px rgba(124,58,237,.35);transition:transform .1s;}
  .next-btn.show{display:block;}
  .next-btn:active{transform:scale(.97);}
  .final-card{background:white;border-radius:24px;padding:30px 22px;text-align:center;box-shadow:0 8px 28px rgba(0,0,0,.1);display:none;}
  .final-card.show{display:block;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
  .final-title{font-family:'Fredoka One',cursive;font-size:2rem;color:#7c3aed;margin-bottom:6px;}
  .final-score{font-family:'Fredoka One',cursive;font-size:3rem;color:#5c6bc0;}
  .final-stars{font-size:2.2rem;letter-spacing:4px;margin:6px 0 12px;}
  .final-msg{font-size:.95rem;color:#666;font-weight:700;margin-bottom:20px;line-height:1.6;}
  .wrong-rev{background:#f5f3ff;border-radius:12px;padding:14px;margin-bottom:18px;text-align:left;}
  .wr-title{font-family:'Fredoka One',cursive;font-size:.9rem;color:#5b21b6;margin-bottom:8px;}
  .wr-item{font-size:.82rem;font-weight:700;color:#555;padding:4px 0;border-bottom:1px solid #f0f0f0;line-height:1.5;}
  .wr-ans{color:#059669;font-weight:900;}
  .final-btns{display:flex;flex-direction:column;gap:10px;}
  .retry-btn{padding:14px;border-radius:50px;border:none;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:white;font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;}
  .next-part-btn{padding:14px;border-radius:50px;border:none;background:linear-gradient(135deg,#f59e0b,#f97316);color:white;font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;}
  .star-pop{position:fixed;font-size:1.8rem;pointer-events:none;animation:fly .9s ease-out forwards;z-index:999;}
  @keyframes fly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.5)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="g-header">
    <div class="g-title" id="gTitle">🟣 Be Verbs!</div>
    <div class="g-prog" id="gProg"></div>
  </div>
  <div class="pbar-wrap"><div class="pbar-fill" id="pbarFill" style="width:0%"></div></div>
  <div class="score-row">
    <div class="score-label" id="scoreLabel"></div>
    <div class="score-val" id="scoreVal"></div>
  </div>
  <div id="content"></div>
  <div class="dots" id="dots"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="handleNext()"></button>
  <div class="final-card" id="finalCard"></div>
</div>
<script>
// ===== DATA =====

// Part 2: Present be verbs (am / is / are)
const PRES_QS = [
  {sentence:'I ___ happy today!', ans:'am', opts:['am','is','are'], emoji:'😊', hint:'Subject: I → am', explain:'I → am (現在式)'},
  {sentence:'She ___ my best friend.', ans:'is', opts:['am','is','are'], emoji:'👧', hint:'Subject: She → is', explain:'He/She/It → is (現在式)'},
  {sentence:'They ___ in the garden.', ans:'are', opts:['am','is','are'], emoji:'🌸', hint:'Subject: They → are', explain:'We/You/They → are (現在式)'},
  {sentence:'My name ___ Katie.', ans:'is', opts:['am','is','are'], emoji:'🏷️', hint:'Subject: My name → is', explain:'He/She/It/Name → is (現在式)'},
  {sentence:'I ___ seven years old.', ans:'am', opts:['am','is','are'], emoji:'🎂', hint:'Subject: I → am', explain:'I → am (現在式)'},
  {sentence:'The cats ___ on the bed.', ans:'are', opts:['am','is','are'], emoji:'🐱', hint:'Subject: The cats (plural) → are', explain:'複數 → are (現在式)'},
  {sentence:'We ___ ready to go!', ans:'are', opts:['am','is','are'], emoji:'🎒', hint:'Subject: We → are', explain:'We/You/They → are (現在式)'},
  {sentence:'It ___ my birthday today!', ans:'is', opts:['am','is','are'], emoji:'🎉', hint:'Subject: It → is', explain:'He/She/It → is (現在式)'},
  {sentence:'You ___ a great reader!', ans:'are', opts:['am','is','are'], emoji:'📚', hint:'Subject: You → are', explain:'We/You/They → are (現在式)'},
  {sentence:'The books ___ on the shelf.', ans:'are', opts:['am','is','are'], emoji:'📖', hint:'Subject: The books (plural) → are', explain:'複數名詞 → are (現在式)'},
  {sentence:'Dad ___ a teacher.', ans:'is', opts:['am','is','are'], emoji:'👨‍🏫', hint:'Subject: Dad → is', explain:'He/She/It → is (現在式)'},
  {sentence:'I ___ so excited!', ans:'am', opts:['am','is','are'], emoji:'🤩', hint:'Subject: I → am', explain:'I → am (現在式)'},
];

// Part 3: Past be verbs (was / were)
const PAST_QS = [
  {sentence:'I ___ at the park yesterday.', ans:'was', opts:['was','were'], emoji:'🌳', hint:'Subject: I → was', explain:'I/He/She/It → was (過去式)'},
  {sentence:'It ___ raining last night.', ans:'was', opts:['was','were'], emoji:'🌧️', hint:'Subject: It → was', explain:'I/He/She/It → was (過去式)'},
  {sentence:'We ___ at school this morning.', ans:'were', opts:['was','were'], emoji:'🏫', hint:'Subject: We → were', explain:'We/You/They → were (過去式)'},
  {sentence:'The dog ___ very playful yesterday.', ans:'was', opts:['was','were'], emoji:'🐕', hint:'Subject: The dog → was', explain:'I/He/She/It → was (過去式)'},
  {sentence:'They ___ good friends.', ans:'were', opts:['was','were'], emoji:'🤝', hint:'Subject: They → were', explain:'We/You/They → were (過去式)'},
  {sentence:'I ___ short before, but now I am tall!', ans:'was', opts:['was','were'], emoji:'📏', hint:'Subject: I → was', explain:'I/He/She/It → was (過去式)'},
  {sentence:'The cookies ___ delicious!', ans:'were', opts:['was','were'], emoji:'🍪', hint:'Subject: The cookies (plural) → were', explain:'複數名詞 → were (過去式)'},
  {sentence:'She ___ sick last week.', ans:'was', opts:['was','were'], emoji:'🤒', hint:'Subject: She → was', explain:'I/He/She/It → was (過去式)'},
  {sentence:'You ___ so brave!', ans:'were', opts:['was','were'], emoji:'🦁', hint:'Subject: You → were', explain:'We/You/They → were (過去式)'},
  {sentence:'The birds ___ singing in the tree.', ans:'were', opts:['was','were'], emoji:'🐦', hint:'Subject: The birds (plural) → were', explain:'複數名詞 → were (過去式)'},
];

// Part 4: Mix (choose from am/is/are/was/were)
const MIX_QS = [
  {sentence:'I ___ happy now.', ans:'am', opts:['am','is','are','was','were'], emoji:'😄', hint:'I + now → present', explain:'I → am (現在式)'},
  {sentence:'She ___ tired yesterday.', ans:'was', opts:['am','is','are','was','were'], emoji:'😴', hint:'She + yesterday → past', explain:'She → was (過去式)'},
  {sentence:'We ___ at the zoo last Sunday.', ans:'were', opts:['am','is','are','was','were'], emoji:'🦒', hint:'We + last Sunday → past', explain:'We → were (過去式)'},
  {sentence:'The baby ___ so cute!', ans:'is', opts:['am','is','are','was','were'], emoji:'👶', hint:'The baby (= it) → present', explain:'It → is (現在式)'},
  {sentence:'They ___ my classmates.', ans:'are', opts:['am','is','are','was','were'], emoji:'👫', hint:'They → present', explain:'They → are (現在式)'},
  {sentence:'I ___ in Grade 1 now.', ans:'am', opts:['am','is','are','was','were'], emoji:'✏️', hint:'I + now → present', explain:'I → am (現在式)'},
  {sentence:'The apples ___ on the table.', ans:'are', opts:['am','is','are','was','were'], emoji:'🍎', hint:'The apples (plural) → present', explain:'複數 → are (現在式)'},
  {sentence:'It ___ cold yesterday.', ans:'was', opts:['am','is','are','was','were'], emoji:'🥶', hint:'It + yesterday → past', explain:'It → was (過去式)'},
];

// ===== STATE =====
let phase = 'learn';
let qi = 0, score = 0, wrong = [], answered = false;
let currentQ = [];

function setPbar(pct, color) {
  const el = document.getElementById('pbarFill');
  el.style.background = color;
  el.style.width = pct + '%';
}
function clearFb() { document.getElementById('feedback').className = 'feedback'; }
function fb(msg, type) { const el = document.getElementById('feedback'); el.innerHTML = msg; el.className = 'feedback show ' + type; }

// ===== PART 1: LEARN =====
function showLearn() {
  phase = 'learn';
  clearFb();
  document.getElementById('gTitle').textContent = '🟣 Be Verbs!';
  document.getElementById('gProg').textContent = 'Part 1 / 4';
  document.getElementById('scoreLabel').textContent = '';
  document.getElementById('scoreVal').textContent = '';
  document.getElementById('dots').innerHTML = '';
  document.getElementById('finalCard').classList.remove('show');
  setPbar(8, 'linear-gradient(90deg,#7c3aed,#a78bfa)');
  document.getElementById('nextBtn').textContent = 'Start Part 2: Present Tense! 🟢';
  document.getElementById('nextBtn').className = 'next-btn show';
  document.getElementById('content').innerHTML = `
    <div class="learn-card">
      <div class="learn-title" style="color:#5b21b6">🟣 Be Verbs — am / is / are / was / were</div>
      <div class="rule-box rule-pres">
        🟢 <b>Present Tense</b> — 現在<br>
        <div class="table-box" style="margin-top:8px;">
          <table>
            <tr><th>Subject 主詞</th><th>Be Verb</th></tr>
            <tr><td>I</td><td><span class="v-am">am</span></td></tr>
            <tr><td>He / She / It</td><td><span class="v-is">is</span></td></tr>
            <tr><td>We / You / They</td><td><span class="v-are">are</span></td></tr>
          </table>
        </div>
        <div class="ex-row" style="margin-top:8px;">
          <span class="ex-chip ec-pr">I <b>am</b> tall.</span>
          <span class="ex-chip ec-pr">She <b>is</b> kind.</span>
          <span class="ex-chip ec-pr">They <b>are</b> happy.</span>
        </div>
      </div>
      <div class="rule-box rule-past">
        🟡 <b>Past Tense</b> — 過去<br>
        <div class="table-box" style="margin-top:8px;">
          <table>
            <tr><th>Subject 主詞</th><th>Be Verb</th></tr>
            <tr><td>I / He / She / It</td><td><span class="v-was">was</span></td></tr>
            <tr><td>We / You / They</td><td><span class="v-were">were</span></td></tr>
          </table>
        </div>
        <div class="ex-row" style="margin-top:8px;">
          <span class="ex-chip ec-pa">I <b>was</b> short before.</span>
          <span class="ex-chip ec-pa">They <b>were</b> tired.</span>
        </div>
      </div>
    </div>`;
}

// ===== PART 2: PRESENT (am/is/are) =====
function startPres() {
  phase = 'pres';
  score = 0; wrong = []; qi = 0; answered = false;
  currentQ = [...PRES_QS].sort(() => Math.random() - .5).slice(0, 10);
  document.getElementById('gTitle').textContent = '🟢 am / is / are';
  document.getElementById('gProg').textContent = 'Part 2 / 4';
  buildDots(currentQ.length);
  showPresQ();
}

function showPresQ() {
  answered = false;
  const q = currentQ[qi];
  const total = currentQ.length;
  setPbar(12 + (qi / total) * 22, 'linear-gradient(90deg,#7c3aed,#a78bfa)');
  document.getElementById('scoreLabel').textContent = `Question ${qi+1} / ${total}`;
  document.getElementById('scoreVal').textContent = `✅ ${score} ❌ ${wrong.length}`;
  clearFb();
  document.getElementById('nextBtn').className = 'next-btn';
  const sentHTML = q.sentence.replace('___', `<span class="q-blank">___</span>`);
  const optsHTML = q.opts.map(o =>
    `<button class="opt-btn" data-val="${o}" onclick="pickOpt(this,'pres')">${o}</button>`
  ).join('');
  document.getElementById('content').innerHTML = `
    <div class="phase-label pl-pres">🟢 Present Tense</div>
    <div class="q-card" id="qCard">
      <span class="q-emoji">${q.emoji}</span>
      <div class="q-sentence">${sentHTML}</div>
      <div class="q-hint">${q.hint}</div>
      <div class="opts-3">${optsHTML}</div>
    </div>`;
  updateDot(qi, 'curr');
}

// ===== PART 3: PAST (was/were) =====
function startPast() {
  phase = 'past';
  score = 0; wrong = []; qi = 0; answered = false;
  currentQ = [...PAST_QS].sort(() => Math.random() - .5).slice(0, 8);
  document.getElementById('gTitle').textContent = '🟡 was / were';
  document.getElementById('gProg').textContent = 'Part 3 / 4';
  buildDots(currentQ.length);
  showPastQ();
}

function showPastQ() {
  answered = false;
  const q = currentQ[qi];
  const total = currentQ.length;
  setPbar(36 + (qi / total) * 22, 'linear-gradient(90deg,#f59e0b,#f97316)');
  document.getElementById('scoreLabel').textContent = `Question ${qi+1} / ${total}`;
  document.getElementById('scoreVal').textContent = `✅ ${score} ❌ ${wrong.length}`;
  clearFb();
  document.getElementById('nextBtn').className = 'next-btn';
  const sentHTML = q.sentence.replace('___', `<span class="q-blank" style="border-color:#f59e0b;color:#f59e0b">___</span>`);
  const optsHTML = q.opts.map(o =>
    `<button class="opt-btn" data-val="${o}" onclick="pickOpt(this,'past')">${o}</button>`
  ).join('');
  document.getElementById('content').innerHTML = `
    <div class="phase-label pl-past">🟡 Past Tense</div>
    <div class="q-card" id="qCard">
      <span class="q-emoji">${q.emoji}</span>
      <div class="q-sentence">${sentHTML}</div>
      <div class="q-hint">${q.hint}</div>
      <div class="opts">${optsHTML}</div>
    </div>`;
  updateDot(qi, 'curr');
}

// ===== PART 4: MIX =====
function startMix() {
  phase = 'mix';
  score = 0; wrong = []; qi = 0; answered = false;
  currentQ = [...MIX_QS].sort(() => Math.random() - .5);
  document.getElementById('gTitle').textContent = '🌈 Mix Challenge!';
  document.getElementById('gProg').textContent = 'Part 4 / 4';
  buildDots(currentQ.length);
  showMixQ();
}

function showMixQ() {
  answered = false;
  const q = currentQ[qi];
  const total = currentQ.length;
  setPbar(60 + (qi / total) * 32, 'linear-gradient(90deg,#059669,#34d399)');
  document.getElementById('scoreLabel').textContent = `Question ${qi+1} / ${total}`;
  document.getElementById('scoreVal').textContent = `✅ ${score} ❌ ${wrong.length}`;
  clearFb();
  document.getElementById('nextBtn').className = 'next-btn';
  const sentHTML = q.sentence.replace('___', `<span class="q-blank" style="border-color:#059669;color:#059669">___</span>`);
  const optsHTML = q.opts.map(o =>
    `<button class="opt-btn" style="font-size:.95rem;" data-val="${o}" onclick="pickOpt(this,'mix')">${o}</button>`
  ).join('');
  document.getElementById('content').innerHTML = `
    <div class="phase-label pl-mix">🌈 am / is / are / was / were</div>
    <div class="q-card" id="qCard">
      <span class="q-emoji">${q.emoji}</span>
      <div class="q-sentence">${sentHTML}</div>
      <div class="q-hint">${q.hint}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">${optsHTML}</div>
    </div>`;
  updateDot(qi, 'curr');
}

// ===== PICK =====
function pickOpt(btn, part) {
  if (answered) return; answered = true;
  const q = currentQ[qi];
  const val = btn.dataset.val;
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  if (val === q.ans) {
    btn.classList.add('correct'); score++; popStars();
    fb(`✅ <b>${q.ans}</b> — ${q.explain}`, 'ok');
    updateDot(qi, 'ok');
  } else {
    btn.classList.add('wrong');
    document.querySelector(`[data-val="${q.ans}"]`).classList.add('correct');
    wrong.push(q);
    fb(`❌ Answer: <b>${q.ans}</b> — ${q.explain}`, 'bad');
    document.getElementById('qCard')?.classList.add('shake');
    setTimeout(() => document.getElementById('qCard')?.classList.remove('shake'), 400);
    updateDot(qi, 'bad');
  }
  document.getElementById('scoreVal').textContent = `✅ ${score} ❌ ${wrong.length}`;
  const nb = document.getElementById('nextBtn');
  nb.textContent = qi === currentQ.length - 1 ? (part === 'mix' ? 'See Results! 🎊' : 'Next Part ➡️') : 'Next ➡️';
  nb.className = 'next-btn show';
}

function handleNext() {
  qi++;
  if (phase === 'learn') { startPres(); return; }
  if (phase === 'pres') {
    if (qi < currentQ.length) showPresQ();
    else { qi = 0; startPast(); }
    return;
  }
  if (phase === 'past') {
    if (qi < currentQ.length) showPastQ();
    else { qi = 0; startMix(); }
    return;
  }
  if (phase === 'mix') {
    if (qi < currentQ.length) showMixQ();
    else showFinal();
    return;
  }
}

function showFinal() {
  const total = PRES_QS.length + PAST_QS.length + MIX_QS.length; // approximation
  const allWrong = wrong;
  document.getElementById('dots').innerHTML = '';
  clearFb();
  document.getElementById('content').innerHTML = '';
  document.getElementById('nextBtn').className = 'next-btn';
  document.getElementById('pbarFill').style.width = '100%';
  const stars = score >= 8 ? '⭐⭐⭐' : score >= 5 ? '⭐⭐' : '⭐';
  const msg = score >= 8 ? 'Amazing! You know all the be verbs! 🏆' : score >= 5 ? 'Great job! Keep practicing!' : 'Good try! Review the table and play again!';
  const wrongHtml = allWrong.length > 0 ? `
    <div class="wrong-rev">
      <div class="wr-title">📝 Review these:</div>
      ${allWrong.map(q => `<div class="wr-item">"${q.sentence.replace('___', `<span class="wr-ans">${q.ans}</span>`)}" — ${q.explain}</div>`).join('')}
    </div>` : '';
  document.getElementById('finalCard').innerHTML = `
    <div class="final-title">🟣 Done!</div>
    <div class="final-score">${score} ⭐</div>
    <div class="final-stars">${stars}</div>
    <div class="final-msg">${msg}</div>
    ${wrongHtml}
    <div class="final-btns">
      <button class="retry-btn" onclick="showLearn()">🔄 Play Again</button>
    </div>`;
  document.getElementById('finalCard').classList.add('show');
  for (let i = 0; i < 4; i++) setTimeout(popStars, i * 200);
}

function buildDots(n) {
  const c = document.getElementById('dots');
  c.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' curr' : '');
    d.id = 'dot' + i;
    c.appendChild(d);
  }
}
function updateDot(i, state) {
  const d = document.getElementById('dot' + i);
  if (!d) return;
  d.className = 'dot ' + state;
  const next = document.getElementById('dot' + (i + 1));
  if (next) next.classList.add('curr');
}
function popStars() {
  const e = ['⭐','✨','🌟','🎉','🟣'];
  for (let i = 0; i < 5; i++) setTimeout(() => {
    const s = document.createElement('div'); s.className = 'star-pop';
    s.textContent = e[Math.floor(Math.random() * e.length)];
    s.style.left = (10 + Math.random() * 80) + 'vw';
    s.style.top = (20 + Math.random() * 50) + 'vh';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }, i * 120);
}

window.onload = showLearn;
</script>
