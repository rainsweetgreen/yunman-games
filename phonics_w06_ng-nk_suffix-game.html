<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 -ng 還是 -nk？</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #fff8f0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ===== WORLD MAP ===== */
  .world {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px 40px;
    text-align: center;
  }
  .world .mascot { font-size: 4rem; display: inline-block; animation: bob 2s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .world h1 { font-family:'Fredoka One',cursive; font-size:2rem; color:#ff6b6b; text-shadow:2px 2px 0 #ffd95a; margin:8px 0 4px; }
  .world p  { color:#aaa; font-size:0.9rem; font-weight:700; margin-bottom:28px; }

  .level-grid { display:flex; flex-direction:column; gap:14px; }

  .lv-btn {
    border-radius: 22px;
    padding: 20px 22px;
    border: 3px solid transparent;
    cursor: pointer;
    text-align: left;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .lv-btn:active { transform: scale(0.97); }
  .lv-btn.lv1 { background: linear-gradient(135deg,#ff9a56,#ff6b35); border-color:#ffb347; box-shadow:0 8px 28px rgba(255,107,53,0.3); }
  .lv-btn.lv2 { background: linear-gradient(135deg,#56c4ff,#3b9eff); border-color:#7dd3fc; box-shadow:0 8px 28px rgba(59,158,255,0.3); }
  .lv-btn.lv3 { background: linear-gradient(135deg,#a78bfa,#7c3aed); border-color:#c4b5fd; box-shadow:0 8px 28px rgba(124,58,237,0.3); }

  .lv-btn .lv-emoji { font-size:2.5rem; display:block; margin-bottom:6px; }
  .lv-btn .lv-num  { font-size:0.72rem; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.7); }
  .lv-btn .lv-name { font-family:'Fredoka One',cursive; font-size:1.5rem; color:white; margin:2px 0; }
  .lv-btn .lv-desc { font-size:0.85rem; font-weight:700; color:rgba(255,255,255,0.8); line-height:1.4; }
  .lv-btn .lv-stars{ position:absolute; top:16px; right:16px; font-size:1.1rem; letter-spacing:2px; }
  .lv-btn .lv-pill {
    display:inline-block; background:rgba(255,255,255,0.22);
    border-radius:50px; padding:3px 12px;
    font-size:0.78rem; font-weight:900; color:white; margin-top:8px;
  }

  /* ===== GAME SCREEN ===== */
  .game-screen { display:none; max-width:520px; margin:0 auto; padding:16px 16px 40px; }
  .game-screen.active { display:block; }

  .g-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .back-btn { width:38px;height:38px;border-radius:50%;border:none;background:rgba(0,0,0,0.08);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
  .g-title  { font-family:'Fredoka One',cursive; font-size:1.3rem; color:#333; flex:1; }
  .g-prog   { font-family:'Fredoka One',cursive; font-size:1rem; color:#ff6b6b; }

  .pbar-wrap { background:#ffe; border-radius:50px; height:10px; margin-bottom:18px; overflow:hidden; box-shadow:inset 0 2px 4px rgba(0,0,0,0.08); }
  .pbar-fill { height:100%; border-radius:50px; transition:width 0.5s ease; }
  .lv1-fill{background:linear-gradient(90deg,#ff9a56,#ffd95a);}
  .lv2-fill{background:linear-gradient(90deg,#56c4ff,#a78bfa);}
  .lv3-fill{background:linear-gradient(90deg,#a78bfa,#ff6b6b);}

  /* teach card */
  .teach {
    background: white;
    border-radius: 20px;
    padding: 18px 20px;
    margin-bottom: 16px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    border-left: 5px solid #ffd95a;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .teach .t-title { font-family:'Fredoka One',cursive; font-size:1.1rem; color:#ff6b6b; margin-bottom:8px; }
  .teach .t-body  { font-size:0.92rem; font-weight:700; color:#555; line-height:1.8; }
  .teach .hl  { color:#ff6b6b; font-size:1.05rem; font-weight:900; }
  .teach .hl2 { color:#3b9eff; font-size:1.05rem; font-weight:900; }
  .teach .hl3 { color:#7c3aed; font-size:1.05rem; font-weight:900; }
  .teach .ex-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .teach .ex-chip {
    background: #fff8e1;
    border: 2px solid #ffd95a;
    border-radius: 50px;
    padding: 4px 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: #333;
  }

  /* Q card */
  .q-card {
    background: white;
    border-radius: 24px;
    padding: 26px 20px 22px;
    text-align: center;
    box-shadow: 0 8px 28px rgba(0,0,0,0.1);
    margin-bottom: 14px;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.82)} to{opacity:1;transform:scale(1)} }
  .q-card.shake { animation: shake 0.35s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }

  .q-emoji { font-size:3.8rem; display:block; margin-bottom:8px; }
  .q-label { font-size:0.78rem; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:#ccc; margin-bottom:8px; }
  .q-word  { font-family:'Fredoka One',cursive; font-size:3rem; color:#222; margin-bottom:4px; letter-spacing:2px; }
  .q-hint  { font-size:0.88rem; font-weight:700; color:#bbb; margin-bottom:20px; }

  /* ===== LV1: SUFFIX PICKER ===== */
  .suffix-choices { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .sfx-btn {
    padding: 16px 8px;
    border-radius: 16px;
    border: 3px solid #eee;
    background: #f9f9f9;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: #333;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.06);
  }
  .sfx-btn:hover { border-color:#ffd95a; background:#fffbe6; transform:translateY(-2px); }
  .sfx-btn:active { transform:scale(0.96); }
  .sfx-btn .sfx-sub { display:block; font-size:0.72rem; font-family:'Nunito',sans-serif; font-weight:700; color:#aaa; margin-top:3px; }
  .sfx-btn.correct-ans { background:#d1fae5; border-color:#059669; color:#065f46; box-shadow:0 4px 14px rgba(5,150,105,0.25); }
  .sfx-btn.wrong-ans   { background:#fee2e2; border-color:#dc2626; color:#991b1b; }

  /* ===== LV2: WORD BUBBLES ===== */
  .bubble-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 8px;
  }
  .bubble-row {
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .bubble {
    padding: 12px 18px;
    border-radius: 50px;
    border: 3px solid #e0e0e0;
    background: white;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: #333;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 3px 10px rgba(0,0,0,0.07);
    min-width: 90px;
    text-align: center;
  }
  .bubble:hover { border-color:#56c4ff; background:#e0f7ff; transform:scale(1.04); }
  .bubble:active { transform:scale(0.97); }
  .bubble.correct-ans { background:#d1fae5; border-color:#059669; color:#065f46; transform:scale(1.06); box-shadow:0 5px 16px rgba(5,150,105,0.25); }
  .bubble.wrong-ans   { background:#fee2e2; border-color:#dc2626; color:#991b1b; animation:shake 0.3s ease; }

  /* ===== LV3: OPEN SYLLABLE ===== */
  .open-syl-word {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
    margin: 0 0 20px;
    flex-wrap: wrap;
  }
  .syl-part {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    padding: 8px 14px;
    border-radius: 14px;
    background: #f0f0f0;
    color: #555;
    border: 3px solid transparent;
    transition: all 0.2s;
    cursor: pointer;
  }
  .syl-part.open-syl {
    background: #f0f0f0;
    border-color: #ddd;
    color: #555;
  }
  .syl-part.tapped {
    background: #fffbe6;
    border-color: #ffd95a;
    color: #b45309;
    transform: scale(1.06);
    box-shadow: 0 3px 12px rgba(255,217,90,0.5);
  }
  .syl-part.selected-open {
    background: #7c3aed;
    color: white;
    border-color: #5b21b6;
    transform: scale(1.08);
    box-shadow: 0 4px 16px rgba(124,58,237,0.4);
  }
  .syl-part.correct-open {
    background: #d1fae5 !important;
    border-color: #059669 !important;
    color: #065f46 !important;
  }
  .syl-div {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    color: #ccc;
  }
  .open-choices { display:flex; flex-direction:column; gap:10px; }
  .open-btn {
    padding: 14px 18px;
    border-radius: 16px;
    border: 3px solid #e0e0e0;
    background: white;
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    color: #333;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 3px 10px rgba(0,0,0,0.07);
    text-align: left;
  }
  .open-btn:hover { border-color:#a78bfa; background:#f5f3ff; }
  .open-btn:active { transform:scale(0.97); }
  .open-btn.correct-ans { background:#d1fae5; border-color:#059669; color:#065f46; }
  .open-btn.wrong-ans   { background:#fee2e2; border-color:#dc2626; color:#991b1b; }

  /* feedback */
  .feedback {
    border-radius: 16px;
    padding: 13px 18px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    text-align: center;
    margin-bottom: 12px;
    display: none;
    animation: fadeUp 0.3s ease;
    line-height: 1.5;
  }
  .feedback.show { display:block; }
  .feedback.ok  { background:#d1fae5; color:#065f46; border:3px solid #6ee7b7; }
  .feedback.bad { background:#fee2e2; color:#991b1b; border:3px solid #fca5a5; }

  .next-btn {
    width:100%; padding:15px;
    border-radius:50px; border:none;
    background:linear-gradient(135deg,#fbbf24,#f59e0b);
    color:white; font-family:'Fredoka One',cursive; font-size:1.3rem;
    cursor:pointer; box-shadow:0 6px 20px rgba(245,158,11,0.35);
    display:none; margin-bottom:14px;
  }
  .next-btn.show { display:block; animation:fadeUp 0.3s ease; }

  /* final */
  .final-card {
    background:white; border-radius:28px;
    padding:36px 22px; text-align:center;
    box-shadow:0 8px 32px rgba(0,0,0,0.1);
    display:none; animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .final-card.show { display:block; }
  .final-card .f-emoji { font-size:5rem; display:block; animation:bob 1s ease-in-out infinite; }
  .final-card h2 { font-family:'Fredoka One',cursive; font-size:2rem; color:#ff6b6b; margin:12px 0 4px; }
  .final-card .f-score { font-family:'Fredoka One',cursive; font-size:3rem; color:#5c6bc0; }
  .final-card .f-stars { font-size:2.5rem; letter-spacing:6px; margin:6px 0 12px; }
  .final-card .f-msg   { font-size:0.98rem; font-weight:700; color:#777; margin-bottom:20px; line-height:1.6; }
  .f-btn {
    width:100%; padding:14px; border-radius:50px; border:none;
    font-family:'Fredoka One',cursive; font-size:1.2rem; cursor:pointer; margin-bottom:10px;
  }
  .f-btn.retry { background:linear-gradient(135deg,#ff9a56,#ff6b35); color:white; box-shadow:0 4px 14px rgba(255,107,53,0.35); }
  .f-btn.map   { background:linear-gradient(135deg,#a78bfa,#7c3aed); color:white; box-shadow:0 4px 14px rgba(124,58,237,0.35); }

  .wrong-rev { margin-top:14px; text-align:left; }
  .wr-item { background:#fff8e1; border-radius:10px; padding:9px 13px; margin-bottom:7px; font-size:0.88rem; font-weight:700; color:#555; border-left:4px solid #ffc107; }
  .wr-item strong { color:#e53935; }
  .wr-item .ans { color:#2e7d32; }

  /* star pop */
  .star-pop { position:fixed; font-size:2rem; pointer-events:none; z-index:300; animation:starFly 0.9s ease-out forwards; }
  @keyframes starFly { from{opacity:1;transform:translateY(0) scale(1)} to{opacity:0;transform:translateY(-110px) scale(2)} }
</style>
</head>
<body>
<div class="wrap" style="max-width:520px;margin:0 auto;padding:16px 16px 60px;">
  <div class="g-header">
    <div class="g-title" id="gTitle"></div>
    <div class="g-prog" id="gProg"></div>
  </div>
  <div class="pbar-wrap"><div class="pbar-fill" id="pbarFill" style="width:0%"></div></div>
  <div class="teach" id="teachCard"></div>
  <div class="q-card" id="qCard"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQ()"></button>
  <div class="final-card" id="finalCard"></div>
</div>
<script>
const data = { 1: {
    title: "🎵 -ng 還是 -nk？", fillClass: "lv1-fill",
    teach: `<div class="t-title">🎵 -ng 和 -nk 的差別！</div>
    <div class="t-body"><span class="hl">-ng</span> → 鼻音，嘴巴閉起來，像在哼歌！<br>
    <div class="ex-row"><span class="ex-chip">si<span style="color:#ff6b6b">ng</span> 🎵</span><span class="ex-chip">thi<span style="color:#ff6b6b">ng</span> 🌟</span><span class="ex-chip">ba<span style="color:#ff6b6b">ng</span> 💥</span></div><br>
    <span class="hl2">-nk</span> → 有一個清脆的 k 音在結尾！<br>
    <div class="ex-row"><span class="ex-chip">ta<span style="color:#3b9eff">nk</span> 🪖</span><span class="ex-chip">wi<span style="color:#3b9eff">nk</span> 😉</span><span class="ex-chip">pi<span style="color:#3b9eff">nk</span> 🌸</span></div></div>`,
    questions: [
      { stem:"si",  emoji:"🎵", hint:"唱歌",     answer:"-ng", options:["-ng","-nk","不用加"] },
      { stem:"thi", emoji:"💭", hint:"東西、事情", answer:"-ng", options:["-ng","-nk","不用加"] },
      { stem:"ta",  emoji:"🪖", hint:"坦克",      answer:"-nk", options:["-ng","-nk","不用加"] },
      { stem:"wi",  emoji:"😉", hint:"眨眼",      answer:"-nk", options:["-ng","-nk","不用加"] },
      { stem:"ba",  emoji:"💥", hint:"砰！",      answer:"-ng", options:["-ng","-nk","不用加"] },
      { stem:"pi",  emoji:"🌸", hint:"粉紅色",    answer:"-nk", options:["-ng","-nk","不用加"] },
      { stem:"ri",  emoji:"💍", hint:"戒指",      answer:"-ng", options:["-ng","-nk","不用加"] },
      { stem:"ra",  emoji:"🏅", hint:"排名",      answer:"-nk", options:["-ng","-nk","不用加"] },
      { stem:"so",  emoji:"🎶", hint:"歌曲",      answer:"-ng", options:["-ng","-nk","不用加"] },
      { stem:"li",  emoji:"🔗", hint:"連結",      answer:"-nk", options:["-ng","-nk","不用加"] },
    ]} };
let lv=1, qi=0, score=0, wrong=[], answered=false, levelStars={1:0};

function startLevel(l) {
  lv=l; qi=0; score=0; wrong=[]; answered=false;
  // single level mode — no worldMap/gameScreen needed
  document.getElementById('finalCard').classList.remove('show');
  document.getElementById('gTitle').textContent=data[lv].title;
  document.getElementById('pbarFill').className='pbar-fill '+data[lv].fillClass;
  document.getElementById('teachCard').innerHTML=data[lv].teach;
  document.getElementById('teachCard').style.display='block';
  showQ();
}

function showQ() {
  const qs=data[lv].questions;
  document.getElementById('gProg').textContent=`${qi+1}/${qs.length}`;
  document.getElementById('pbarFill').style.width=((qi/qs.length)*100)+'%';
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='next-btn';
  document.getElementById('finalCard').classList.remove('show');
  answered=false;

  const q=qs[qi];
  const qc=document.getElementById('qCard');
  qc.style.display='block';
  qc.style.animation='none'; void qc.offsetWidth; qc.style.animation='popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)';

  if(lv===1) renderLv1(q);
  else if(lv===2) renderLv2(q);
  else renderLv3(q);
}

// LV1
function renderLv1(q) {
  const btns = q.options.map((o,i)=>`
    <button class="sfx-btn" onclick="checkLv1(${i},'${o}','${q.answer}','${q.stem}')">
      ${o}
      <span class="sfx-sub">${o==='-ng'?'鼻音':o==='-nk'?'k音':'不加'}</span>
    </button>`).join('');
  document.getElementById('qCard').innerHTML=`
    <div class="q-label">這個單字結尾是哪個？</div>
    <span class="q-emoji">${q.emoji}</span>
    <div class="q-word">${q.stem}___</div>
    <div class="q-hint">「${q.hint}」</div>
    <div class="suffix-choices">${btns}</div>`;
}
function checkLv1(idx,chosen,correct,stem) {
  if(answered)return; answered=true;
  document.querySelectorAll('.sfx-btn').forEach(b=>b.disabled=true);
  const btns=document.querySelectorAll('.sfx-btn');
  const fb=document.getElementById('feedback');
  if(chosen===correct){
    btns[idx].classList.add('correct-ans');
    score++; popStars();
    fb.innerHTML=`✅ 正確！<b>${stem}${correct}</b> 完成了！🎉`;
    fb.className='feedback show ok';
  } else {
    btns[idx].classList.add('wrong-ans');
    const ci=document.querySelectorAll('.sfx-btn');
    [...ci].forEach((b,i)=>{ if(b.textContent.trim().startsWith(correct)) b.classList.add('correct-ans'); });
    wrong.push({word:stem+'___', ans:stem+correct});
    fb.innerHTML=`❌ 答錯了！正確是 <b style="color:#059669">${stem}${correct}</b>`;
    fb.className='feedback show bad';
    document.getElementById('qCard').classList.add('shake');
    setTimeout(()=>document.getElementById('qCard').classList.remove('shake'),400);
  }
  setNextBtn();
}

// LV2
function renderLv2(q) {
  const btns=q.options.map((o,i)=>`<button class="bubble" onclick="checkLv2(${i},${q.answer})">${o}</button>`).join('');
  document.getElementById('qCard').innerHTML=`
    <div class="q-label">選出正確的單字！</div>
    <span class="q-emoji">${q.emoji}</span>
    <div class="q-hint" style="font-size:1rem;color:#555;font-weight:800;margin-bottom:16px">${q.q}</div>
    <div class="bubble-row">${btns}</div>`;
}
function checkLv2(idx,correct) {
  if(answered)return; answered=true;
  document.querySelectorAll('.bubble').forEach(b=>b.disabled=true);
  const btns=document.querySelectorAll('.bubble');
  const fb=document.getElementById('feedback');
  const q=data[lv].questions[qi];
  if(idx===correct){
    btns[idx].classList.add('correct-ans');
    score++; popStars();
    fb.innerHTML=`✅ 答對了！${q.explain} 🎉`;
    fb.className='feedback show ok';
  } else {
    btns[idx].classList.add('wrong-ans');
    btns[correct].classList.add('correct-ans');
    wrong.push({word:q.options[idx], ans:q.options[correct]+' — '+q.explain});
    fb.innerHTML=`❌ 答錯了！${q.explain}`;
    fb.className='feedback show bad';
    document.getElementById('qCard').classList.add('shake');
    setTimeout(()=>document.getElementById('qCard').classList.remove('shake'),400);
  }
  setNextBtn();
}

// LV3 - tap syllable directly
function renderLv3(q) {
  const sylHtml = q.syllables.map((s,i)=>`
    ${i>0?'<div class="syl-div">·</div>':''}
    <div class="syl-part open-syl" id="syl_${i}" onclick="checkLv3(${i},${JSON.stringify(q).replace(/"/g,"'")})">${s}</div>
  `).join('');
  document.getElementById('qCard').innerHTML=`
    <div class="q-label">✨ 點你覺得是開音節的音節！</div>
    <span class="q-emoji">${q.emoji}</span>
    <div class="q-hint" style="font-weight:800;color:#555;font-size:1rem;margin-bottom:6px">「${q.hint}」</div>
    <div class="open-syl-word">${sylHtml}</div>
    <div class="q-hint" style="margin-top:4px;color:#bbb;font-size:0.85rem">提示：結尾是母音（a e i o u）的音節就是開音節！</div>`;
}
function checkLv3(tappedIdx, q) {
  if(answered)return; answered=true;
  // openIdx can be number or array
  const correctIdxs = Array.isArray(q.openIdx) ? q.openIdx : [q.openIdx];
  const isCorrect = correctIdxs.includes(tappedIdx);

  document.querySelectorAll('.syl-part').forEach((p,i)=>{
    p.style.pointerEvents='none';
    if(i===tappedIdx) p.classList.add('tapped');
  });
  const fb=document.getElementById('feedback');
  setTimeout(()=>{
    if(isCorrect){
      // highlight all correct open syllables green
      document.querySelectorAll('.syl-part').forEach((p,i)=>{
        if(correctIdxs.includes(i)) p.classList.add('selected-open');
      });
      score++; popStars();
      const allOpen = correctIdxs.length > 1 ? '兩個都是開音節！' : '';
      fb.innerHTML='✅ 找到了！'+allOpen+q.explain+' ✨';
      fb.className='feedback show ok';
    } else {
      document.querySelectorAll('.syl-part')[tappedIdx].classList.remove('tapped');
      document.querySelectorAll('.syl-part')[tappedIdx].classList.add('wrong-ans');
      document.querySelectorAll('.syl-part').forEach((p,i)=>{
        if(correctIdxs.includes(i)) p.classList.add('selected-open');
      });
      const correctWords = correctIdxs.map(i=>q.syllables[i]).join(' 和 ');
      wrong.push({word:q.word, ans:correctWords+' 是開音節 — '+q.explain});
      fb.innerHTML='❌ 再想想！'+q.explain;
      fb.className='feedback show bad';
      document.getElementById('qCard').classList.add('shake');
      setTimeout(()=>document.getElementById('qCard').classList.remove('shake'),400);
    }
    setNextBtn();
  }, 200);
}

function setNextBtn() {
  const nb=document.getElementById('nextBtn');
  nb.textContent = qi===data[lv].questions.length-1 ? '看結果 🎊' : '下一題 ➡️';
  nb.className='next-btn show';
}

function nextQ() {
  qi++;
  if(qi>=data[lv].questions.length){ showFinal(); return; }
  document.getElementById('teachCard').style.display='none';
  showQ();
}

function showFinal() {
  document.getElementById('qCard').style.display='none';
  document.getElementById('feedback').style.display='none';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('teachCard').style.display='none';
  document.getElementById('pbarFill').style.width='100%';

  const total=data[lv].questions.length;
  const pct=score/total;
  const stars=pct>=0.9?3:pct>=0.6?2:1;
  levelStars[lv]=Math.max(levelStars[lv],stars);
  updateStars();

  let emoji,title,msg;
  if(pct===1){emoji='🏆';title='全部答對！！';msg='Yunman 你太厲害了！這一關完全學會了！🎉';}
  else if(pct>=0.75){emoji='😊';title='好棒！差一點！';msg='快全對了！看看答錯的地方，再試一次吧！';}
  else{emoji='💪';title='繼續加油！';msg='沒關係！看看下面答錯的，再練習一次！';}

  let rev='';
  if(wrong.length>0){
    rev='<div class="wrong-rev"><div style="font-weight:900;color:#e53935;margin-bottom:8px;font-size:0.9rem">📝 複習這些：</div>';
    wrong.forEach(w=>{rev+=`<div class="wr-item"><strong>${w.word}</strong> → <span class="ans">${w.ans}</span></div>`;});
    rev+='</div>';
  }

  const f=document.getElementById('finalCard');
  f.innerHTML=`
    <span class="f-emoji">${emoji}</span>
    <h2>${title}</h2>
    <div class="f-score">${score} / ${total}</div>
    <div class="f-stars">${'⭐'.repeat(stars)+'☆'.repeat(3-stars)}</div>
    <div class="f-msg">${msg}</div>
    <button class="f-btn retry" onclick="startLevel(${lv})">🔄 再玩一次！</button>
    
    ${rev}`;
  f.classList.add('show');
  for(let i=0;i<4;i++) setTimeout(popStars, i*300);
}

function updateStars() {
  [1,2,3].forEach(l=>{
    document.getElementById('stars'+l).textContent='⭐'.repeat(levelStars[l])+'☆'.repeat(3-levelStars[l]);
  });
}

function goBack() {
  // no worldMap in single mode
  // no worldMap in single mode
  ['qCard','feedback','nextBtn'].forEach(id=>{
    const el=document.getElementById(id);
    el.style.display=''; el.className=el.className.replace(' show','');
  });
}

function popStars() {
  const e=['⭐','🌟','✨','🎉','🎊','🎵','💥'];
  for(let i=0;i<5;i++){
    setTimeout(()=>{
      const s=document.createElement('div');
      s.className='star-pop';
      s.textContent=e[Math.floor(Math.random()*e.length)];
      s.style.left=(15+Math.random()*70)+'vw';
      s.style.top=(20+Math.random()*50)+'vh';
      document.body.appendChild(s);
      setTimeout(()=>s.remove(),900);
    },i*100);
  }
}
window.onload = () => startLevel(1);
</script>
</body>
</html>
